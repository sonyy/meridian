<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>meridian · dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0b0e;
    --bg2: #12141a;
    --bg3: #1a1d26;
    --border: #242834;
    --text: #e2e5eb;
    --text2: #888b98;
    --green: #34d399;
    --green-dim: rgba(52,211,153,.12);
    --red: #fb7185;
    --red-dim: rgba(251,113,133,.1);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,.1);
    --blue: #60a5fa;
    --accent: #34d399;
    --radius: 10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', -apple-system, sans-serif;
    padding: 24px;
    min-height: 100vh;
  }

  /* ─── header ─── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
  }
  .header h1 {
    font-size: 22px; font-weight: 600; letter-spacing: -.3px;
  }
  .header h1 span { color: var(--accent); }
  .header-right {
    display: flex; align-items: center; gap: 16px;
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text2);
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 500;
  }
  .badge.on { background: var(--green-dim); color: var(--green); }
  .badge.off { background: var(--red-dim); color: var(--red); }

  /* ─── summary bar ─── */
  .summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr));
    gap: 12px; margin-bottom: 32px;
  }
  .summary-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .summary-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text2); margin-bottom: 6px; }
  .summary-card .value { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 500; }
  .summary-card .value.green { color: var(--green); }
  .summary-card .value.red { color: var(--red); }
  .summary-card .value.amber { color: var(--amber); }
  .summary-card .sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ─── config bar ─── */
  .config-bar {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 28px; font-size: 12px; font-family: 'IBM Plex Mono', monospace;
  }
  .config-tag {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; color: var(--text2);
  }
  .config-tag strong { color: var(--text); font-weight: 500; }

  /* ─── section titles ─── */
  .section-title {
    font-size: 14px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .6px; color: var(--text2); margin-bottom: 16px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .count {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    background: var(--bg3); padding: 1px 8px; border-radius: 10px; color: var(--text);
  }

  /* ─── position grid ─── */
  .positions { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px,1fr)); gap: 16px; margin-bottom: 36px; }

  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .card-header .pair {
    font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px;
  }
  .card-header .pair .oor-badge {
    font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .oor-badge.in { background: var(--green-dim); color: var(--green); }
  .oor-badge.out { background: var(--red-dim); color: var(--red); }
  .card-header .pnl-big {
    font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600;
  }
  .card-body { padding: 14px 16px; }

  .meta-grid {
    display: grid; grid-template-columns: auto 1fr auto 1fr; gap: 3px 12px; margin-bottom: 10px;
    font-size: 11px;
  }
  .meta-grid .m-label { color: var(--text2); }
  .meta-grid .m-value { font-family: 'IBM Plex Mono', monospace; text-align: right; }

  /* ─── chart area ─── */
  .chart-wrap {
    position: relative; height: 90px; margin-top: 4px; border-radius: 6px;
    background: var(--bg3); overflow: hidden; width: 100%;
  }
  .chart-wrap canvas { width: 100% !important; height: 90px !important; max-width: 100%; }

  /* ─── range bar ─── */
  .range-bar-wrap {
    position: relative; height: 28px; margin-top: 8px;
    background: var(--bg3); border-radius: 5px; overflow: hidden;
  }
  .range-fill {
    position: absolute; top: 0; height: 100%;
    background: var(--green-dim); border-left: 2px solid var(--green);
    border-right: 2px solid var(--green); border-radius: 2px;
  }
  .range-label {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 9px; font-family: 'IBM Plex Mono', monospace; color: var(--text2);
    white-space: nowrap;
  }
  .range-label.l { left: 4px; }
  .range-label.r { right: 4px; }

  /* ─── pnl bar ─── */
  .pnl-bar-wrap {
    position: relative; height: 28px; margin-top: 4px; border-radius: 5px;
    overflow: visible; background: var(--bg3);
  }
  .pnl-bar-bg {
    position: absolute; top: 0; left: 0; right: 0; height: 100%;
    border-radius: 5px;
    background: linear-gradient(to right, rgba(251,113,133,0.18), rgba(251,191,36,0.12), rgba(52,211,149,0.18));
  }
  .pnl-sl-line, .pnl-tp-line {
    position: absolute; top: 1px; width: 1.5px; height: calc(100% - 2px);
    border-radius: 0;
  }
  .pnl-sl-line { background: var(--red); }
  .pnl-tp-line { background: var(--green); }
  .pnl-sl-label, .pnl-tp-label {
    position: absolute; top: 1px;
    font-size: 7px; font-family: 'IBM Plex Mono', monospace; white-space: nowrap; z-index: 2;
  }
  .pnl-sl-label { color: var(--red); }
  .pnl-tp-label { color: var(--green); }
  .pnl-cursor {
    position: absolute; bottom: 0; width: 1.5px; height: 100%;
    z-index: 3; pointer-events: none;
  }
  .pnl-cursor-label {
    position: absolute; bottom: 0;
    font-size: 7px; font-family: 'IBM Plex Mono', monospace; white-space: nowrap;
    z-index: 3; line-height: 9px;
  }


  /* ─── closed table ─── */
  .closed-wrap { overflow-x: auto; }
  .closed-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .closed-table th {
    text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .5px; color: var(--text2); border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  .closed-table td {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
  }
  .closed-table tr:hover td { background: var(--bg3); }

  .no-data {
    text-align: center; padding: 48px 16px; color: var(--text2); font-size: 14px;
  }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .positions { grid-template-columns: 1fr; }
    .summary { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>meridian<span>.</span></h1>
  <div class="header-right">
    <span id="modeBadge"></span>
    <span id="refreshTime"></span>

  </div>
</div>

<div class="summary" id="summary"></div>
<div class="config-bar" id="configBar"></div>

<div class="section-title">open positions <span class="count" id="openCount"></span></div>
<div class="positions" id="openPositions"></div>

<div class="section-title">closed trades <span class="count" id="closedCount"></span></div>
<div class="closed-wrap" id="closedWrap"></div>

<script>
function fmtSol(v) {
  v = Number(v) || 0;
  if (v === 0) return '0';
  if (Math.abs(v) >= 0.0001) return v.toFixed(4);
  if (Math.abs(v) >= 1e-9) return v.toExponential(2);
  return '0';
}
const EXIT_LABELS = {
  oor_above:     'OOR above ↑',
  oor_below:     'OOR below ↓',
  oor:           'OOR',
  stop_loss:     'Stop Loss',
  trailing_tp:   'Trailing TP',
  take_profit:   'Take Profit',
  low_yield:     'Low Yield',
  rug_guard:     'Rug Guard',
  volatility_drop: 'Volatility Drop',
  agent_decision:  'Agent Decision',
};
function fmtExitReason(p) {
  // Try canonical exit_reason first
  const er = p.exit_reason || '';
  if (er) {
    const label = EXIT_LABELS[er];
    if (label) return label;
    return er;
  }
  // Fallback: free-text close_reason — keyword match
  const r = (p.close_reason || '').toLowerCase();
  if (!r) return '-';
  if (r.includes('oor') || r.includes('out of range')) {
    if (p.last_price != null && p.range_upper != null && p.last_price > p.range_upper) return 'OOR above ↑';
    if (p.last_price != null && p.range_lower != null && p.last_price < p.range_lower) return 'OOR below ↓';
    return 'OOR';
  }
  if (r.includes('trailing')) return 'Trailing TP';
  if (r.includes('stop loss') || r.includes('stop_loss')) return 'Stop Loss';
  if (r.includes('low yield') || r.includes('low_yield')) return 'Low Yield';
  if (r.includes('take profit') || r.includes('take_profit') || r.includes('rule 2')) return 'Take Profit';
  if (r.includes('rug')) return 'Rug Guard';
  if (r.includes('volatility')) return 'Volatility Drop';
  if (r.includes('agent')) return 'Agent Decision';
  // Unknown — show short label (first segment before dash)
  const short = (p.close_reason || '').split(/[—–]/)[0].trim();
  if (short.length < 45) return short;
  return short.slice(0, 42) + '...';
}
let charts = new Map();  // positionId → Chart instance

// Plugin: draw colored price markers on Y-axis
Chart.register({
  id: 'priceMarkers',
  afterDraw(chart) {
    try {
      const ctx = chart.ctx;
      const chartArea = chart.chartArea;
      const yScale = chart.scales.y;
      if (!yScale || !chartArea) return;

      // 1. Draw bin volume profile on the right margin
      const binData = chart.options._binData;
      if (binData && binData.length > 0) {
        const maxVol = binData.reduce((m, b) => Math.max(m, b.volume), 0) || 1;
        const barMaxWidth = Math.max(60, (chartArea.right - chartArea.left) * 0.50);
        ctx.save();
        for (const b of binData) {
          const yPos = yScale.getPixelForValue(b.price);
          if (!Number.isFinite(yPos)) continue;
          if (yPos < chartArea.top - 2 || yPos > chartArea.bottom + 2) continue;
          const barW = Math.max(1, (b.volume / maxVol) * barMaxWidth);
          const alpha = Math.max(0.04, Math.min(0.18, (b.volume / maxVol) * 0.14 + 0.04));
          ctx.fillStyle = `rgba(251,191,36,${alpha})`;
          ctx.fillRect(chartArea.right - barW, yPos - 0.5, barW, 1);
        }
        ctx.restore();
      }

      // 2. Draw price markers
      const markers = chart.options._markerPrices;
      if (!markers || !markers.length) return;
      const xLeft = Math.max(4, chartArea.left + 4);
      ctx.save();
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.font = '8px "IBM Plex Mono", monospace';
      for (const m of markers) {
        const yPos = yScale.getPixelForValue(m.price);
        if (!Number.isFinite(yPos)) continue;
        if (yPos < chartArea.top - 2 || yPos > chartArea.bottom + 2) continue;
        const text = String(m.label);
        const w = ctx.measureText(text).width + 5;
        ctx.fillStyle = 'rgba(10,14,23,0.82)';
        ctx.fillRect(xLeft - 2, yPos - 6, w, 12);
        ctx.fillStyle = m.color;
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur = 3;
        ctx.fillText(text, xLeft, yPos);
      }
      ctx.restore();
    } catch (e) {
      // keep chart alive if a marker is outside the current scale
    }
  }
});

function fetchData() {
  fetch('/api/positions', { cache: 'no-store' })
    .then(r => r.json())
    .then(d => {
      document.getElementById('refreshError')?.remove();
      render(d);
    })
    .catch(e => {
      // Don't wipe data — just show a subtle error badge
      let err = document.getElementById('refreshError');
      if (!err) {
        err = document.createElement('span');
        err.id = 'refreshError';
        err.style.cssText = 'margin-left:8px;font-size:11px;color:var(--red)';
        document.getElementById('refreshTime').after(err);
      }
      err.textContent = `⚠ ${e.message}`;
      // auto-retry after 2s
      setTimeout(fetchData, 2000);
    });
}

function render(d) {
  // mode badge
  document.getElementById('modeBadge').innerHTML =
    d.config.virtualMode
      ? '<span class="badge on">◉ virtual mode</span>'
      : '<span class="badge off">◯ live mode</span>';
  document.getElementById('refreshTime').textContent = new Date().toLocaleTimeString();

  // summary
  const s = d.summary;
  document.getElementById('summary').innerHTML = `
    <div class="summary-card">
      <div class="label">Wallet</div>
      <div class="value">${(d.wallet.sol + s.open_deployed_sol + s.unrealized_pnl_sol).toFixed(4)} <span style="font-size:12px;color:var(--text2)">SOL</span></div>
      <div class="sub">saldo ${d.wallet.sol.toFixed(4)} + deployed ${s.open_deployed_sol.toFixed(4)} + unrealized ${s.unrealized_pnl_sol.toFixed(4)} · initial ${d.wallet.initial_sol.toFixed(4)} SOL</div>
    </div>
    <div class="summary-card">
      <div class="label">Open / Closed</div>
      <div class="value">${s.open_count} / ${s.closed_count}</div>
    </div>
    <div class="summary-card">
      <div class="label">PnL</div>
      <div class="value ${s.total_pnl_sol > 0 ? 'green' : s.total_pnl_sol < 0 ? 'red' : ''}">${s.total_pnl_sol > 0 ? '+' : ''}${s.total_pnl_sol === 0 ? '0' : s.total_pnl_sol} <span style="font-size:12px;color:var(--text2)">SOL</span> <span style="font-size:14px;${s.net_pnl_pct > 0 ? 'color:#4ade80' : s.net_pnl_pct < 0 ? 'color:#ff4444' : ''}">(${s.net_pnl_pct > 0 ? '+' : ''}${s.net_pnl_pct}%)</span></div>
      <div class="sub">unrealized: ${s.unrealized_pnl_sol > 0 ? '+' : ''}${s.unrealized_pnl_sol === 0 ? '0' : s.unrealized_pnl_sol} SOL · fees: ${s.total_fees_sol} SOL</div>
    </div>
    <div class="summary-card">
      <div class="label">Win Rate</div>
      <div class="value">${s.win_rate}%</div>
      <div class="sub">${s.wins}W / ${s.losses}L${s.break_even > 0 ? ` / ${s.break_even} BE` : ''}</div>
    </div>
  `;

  // config bar
  const c = d.config;
  document.getElementById('configBar').innerHTML = `
    <span class="config-tag">strategy <strong>${c.strategy}</strong></span>
    <span class="config-tag">range bins <strong>${c.minBinsBelow ?? '?'}–${c.maxBinsBelow ?? '?'}</strong></span>
    <span class="config-tag">bin step <strong>${c.minBinStep ?? '?'}–${c.maxBinStep ?? '?'}</strong></span>
    <span class="config-tag">SL <strong>${c.stopLossPct}%</strong></span>
    <span class="config-tag">TP <strong>${c.takeProfitPct}%</strong></span>
    <span class="config-tag">trailing <strong>${c.trailingTakeProfit ? `ON (trg ${c.trailingTriggerPct}%, drop ${c.trailingDropPct}%)` : 'OFF'}</strong></span>
    <span class="config-tag">OOR <strong>${c.outOfRangeWaitMinutes}m</strong></span>
    <span class="config-tag">deploy <strong>${c.deployAmountSol} SOL</strong></span>
    <span class="config-tag">gas <strong>${c.gasReserve} SOL</strong></span>
    <span class="config-tag">size <strong>${(c.positionSizePct * 100)}%</strong></span>
    <span class="config-tag">max <strong>${c.maxDeployAmount} SOL</strong></span>
    <span class="config-tag">fee/TVL <strong>${c.minFeeActiveTvlRatio ?? '?'}</strong></span>
    <span class="config-tag">TVL <strong>${c.minTvl?.toLocaleString() ?? '?'}–${c.maxTvl?.toLocaleString() ?? '?'}</strong></span>
    <span class="config-tag">vol <strong>≥${c.minVolume ?? '?'}</strong></span>
    <span class="config-tag">organic <strong>≥${c.minOrganic ?? '?'}</strong></span>
    <span class="config-tag">holders <strong>≥${c.minHolders ?? '?'}</strong></span>
    <span class="config-tag">mcap <strong>${c.minMcap?.toLocaleString() ?? '?'}–${c.maxMcap?.toLocaleString() ?? '?'}</strong></span>
    <span class="config-tag">age <strong>${c.minTokenAgeHours ?? '?'}–${c.maxTokenAgeHours ?? '?'}h</strong></span>
    <span class="config-tag">yield24h <strong>≥${c.minFeePerTvl24h ?? '?'}%</strong></span>
    <span class="config-tag">🧪 <strong>${c.virtualMode ? 'ON' : 'OFF'}</strong></span>
  `;

  // === open positions (DOM diff — preserve canvas elements) ===
  const container = document.getElementById('openPositions');
  const openList = d.open || [];
  document.getElementById('openCount').textContent = openList.length;

  if (openList.length === 0) {
    container.innerHTML = '<div class="no-data">no open positions</div>';
    charts.forEach((ch, pid) => { ch.destroy(); });
    charts.clear();
  } else {
    const openPids = new Set(openList.map(p => p.id));

    // Remove cards for positions no longer open
    Array.from(container.children).forEach(child => {
      if (child.dataset && child.dataset.pid && !openPids.has(child.dataset.pid)) {
        const ch = charts.get(child.dataset.pid);
        if (ch) { ch.destroy(); charts.delete(child.dataset.pid); }
        child.remove();
      }
    });

    // Update or create cards
    openList.forEach((p, i) => {
      let card = container.querySelector(`[data-pid="${p.id}"]`);
      if (card) {
        // Preserve canvas before metadata refresh
        const oldCanvas = card.querySelector('.chart-wrap canvas');
        card.innerHTML = renderCard(p, c);
        if (oldCanvas) card.querySelector('.chart-wrap').appendChild(oldCanvas);
      } else {
        card = document.createElement('div');
        card.dataset.pid = p.id;
        card.innerHTML = renderCard(p, c);
        container.appendChild(card);
      }
    });
  }

  // closed trades (no charts, innerHTML fine)
  const closedList = (d.closed || []).sort((a, b) => new Date(b.closed_at) - new Date(a.closed_at));
  document.getElementById('closedCount').textContent = closedList.length;

  if (closedList.length === 0) {
    document.getElementById('closedWrap').innerHTML = '<div class="no-data">no closed trades yet</div>';
  } else {
    document.getElementById('closedWrap').innerHTML =
      `<table class="closed-table">
        <thead><tr>
          <th>Pair</th><th>Deploy</th><th>PnL</th><th>Fees</th><th>IL</th><th>Duration</th><th>Exit Reason</th><th>Open</th><th>Close</th>
        </tr></thead>
        <tbody>
          ${closedList.map(p => `
            <tr>
              <td style="font-weight:500"><a href="https://gmgn.ai/sol/token/${p.token_mint || ''}" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none">${p.pair}</a></td>
              <td>${p.deposit?.toFixed(2)} SOL</td>
              <td style="color:${(p.pnl_pct||0) >= 0 ? 'var(--green)' : 'var(--red)'}">${(p.pnl_pct||0) >= 0 ? '+' : ''}${p.pnl_pct?.toFixed(1)}% (${(p.net_pnl||0) >= 0 ? '+' : ''}${p.net_pnl?.toFixed(4)})</td>
              <td>${fmtSol(p.fees_earned)} SOL</td>
              <td style="color:${(p.il_usd||0) < 0 ? 'var(--red)' : 'var(--text2)'}">${fmtSol(p.il_usd)}</td>
              <td>${p.duration_hours?.toFixed(1) || '-'}h</td>
              <td style="color:var(--text2);font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(p.exit_reason||p.close_reason||'').replace(/"/g,'&quot;')}">${fmtExitReason(p)}</td>
              <td style="font-size:11px">${p.opened_at ? new Date(p.opened_at).toLocaleString() : '-'}</td>
              <td style="font-size:11px">${p.closed_at ? new Date(p.closed_at).toLocaleString() : '-'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  // draw/update charts
  openList.forEach((p, i) => drawChart(p, i, c));
}

function renderCard(p, c) {
  const pnlClass = (p.pnl_pct || 0) >= 0 ? 'green' : 'red';
  const oorClass = p.in_range ? 'in' : 'out';
  const oorLabel = p.in_range ? 'IN' : p.minutes_out_of_range != null ? `OOR ${p.minutes_out_of_range}m` : 'OOR';
  const dur = p.duration_hours != null ? `${p.duration_hours.toFixed(1)}h` : '-';

  return `
    <div class="card" data-pid="${p.id}">
      <div class="card-header">
        <div class="pair">
          <a href="https://gmgn.ai/sol/token/${p.token_mint || ''}" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none;border-bottom:1px dotted rgba(255,255,255,0.2)">${p.pair}</a>
          <span class="oor-badge ${oorClass}">${oorLabel}</span>
        </div>
        <div class="pnl-big ${pnlClass}">${(p.pnl_pct||0) >= 0 ? '+' : ''}${(p.pnl_pct||0).toFixed(2)}%</div>
      </div>
      <div class="card-body">
        <div class="meta-grid">
          <span class="m-label">strategy</span><span class="m-value">${p.strategy || '-'}</span>
          <span class="m-label">deploy</span><span class="m-value">${(p.deposit||0).toFixed(2)} SOL</span>
          <span class="m-label">net PnL</span><span class="m-value ${pnlClass}">${(p.net_pnl||0) >= 0 ? '+' : ''}${(p.net_pnl||0).toFixed(4)} SOL (${(p.pnl_pct||0) >= 0 ? '+' : ''}${(p.pnl_pct||0).toFixed(2)}%)</span>
          <span class="m-label">fees earned</span><span class="m-value">${fmtSol(p.fees_earned)} SOL</span>
          <span class="m-label">fee APR</span><span class="m-value">${p.annualized_fee_apr != null ? p.annualized_fee_apr.toFixed(1) + '%' : '-'}</span>
          <span class="m-label">IL</span><span class="m-value">${fmtSol(p.il_usd)} SOL</span>
          <span class="m-label">age</span><span class="m-value">${dur}</span>
          <span class="m-label">trailing</span><span class="m-value">${p.trailing_active ? `🟢 peak ${(p.peak_pnl_pct||0).toFixed(1)}%` : '−'}</span>
          <span class="m-label">candles</span><span class="m-value">${p.candles_total || 0}</span>
          <span class="m-label">SL / TP</span><span class="m-value"><span style="color:var(--red)">${c.stopLossPct}%</span> / <span style="color:var(--green)">+${c.takeProfitPct}%</span></span>
        </div>
        <div style="margin-top:8px;width:100%">
          <div class="chart-wrap"></div>
          <div class="range-bar-wrap"></div>
          <div class="pnl-bar-wrap"></div>
        </div>
      </div>
    </div>
  `;
}

function drawChart(p, i, c) {
  const card = document.querySelector(`[data-pid="${p.id}"]`);
  if (!card) return;
  const chartWrap = card.querySelector('.chart-wrap');
  if (!chartWrap) return;

  // Create canvas once; reuse on subsequent renders
  let canvas = chartWrap.querySelector('canvas');
  if (!canvas) {
    canvas = document.createElement('canvas');
    chartWrap.appendChild(canvas);
  }
  const ctx = canvas.getContext('2d');

  const entryPrice = p.entry_price || 1;
  const price = p.last_price || entryPrice;
  const lower = p.range_lower || price * 0.5;
  const upper = p.range_upper || price * 1.5;
  const tokenSymbol = (p.chart_token || p.pair?.split('-')[0] || '').toUpperCase();
  const cacheKey = `kline_${p.id}`;

  let cachedRaw = sessionStorage.getItem(cacheKey);
  let cached = cachedRaw ? JSON.parse(cachedRaw) : null;
  let klinePromise;
  if (cached && Date.now() - (cached._cachedAt || 0) < 120000) {
    klinePromise = Promise.resolve(cached);
  } else {
    klinePromise = fetch(`/api/kline/${tokenSymbol}?position=${p.id}`).then(r => r.json()).then(d => {
        if (d.candles && d.candles.length) {
          d._cachedAt = Date.now();
          sessionStorage.setItem(cacheKey, JSON.stringify(d));
          return d;
        }
        return null;
      }).catch(() => null);
  }

  klinePromise.then(kd => {
    // Update OOR badge from chart data (last candle close vs range)
    const badge = card.querySelector('.oor-badge');
    if (badge && kd && kd.candles && kd.candles.length > 0) {
      const lastCdl = kd.candles[kd.candles.length - 1];
      const chartClose = parseFloat(lastCdl.close || lastCdl.c);
      if (!isNaN(chartClose) && lower > 0 && upper > 0) {
        const chartInRange = chartClose >= lower && chartClose <= upper;
        badge.className = 'oor-badge ' + (chartInRange ? 'in' : 'out');
        badge.textContent = chartInRange ? 'IN' : 'OOR';
      }
    }

    const prices = [];
    const labels = [];
    let minP = Infinity, maxP = -Infinity;
    if (kd && kd.candles && kd.candles.length > 2) {
      const step = Math.max(1, Math.floor(kd.candles.length / 60));
      for (let idx = 0; idx < kd.candles.length; idx += step) {
        const cdl = kd.candles[idx];
        const c = parseFloat(cdl.close || cdl.c);
        const t = cdl.time || cdl.t;
        if (!isNaN(c)) {
          prices.push(c);
          const d = new Date(Number(t));
          labels.push(d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'));
          if (c < minP) minP = c;
          if (c > maxP) maxP = c;
        }
      }
    } else {
      const steps = 20;
      for (let k = 0; k <= steps; k++) {
        const t = k / steps;
        const base = entryPrice + (price - entryPrice) * t;
        prices.push(base);
        labels.push('');
      }
      minP = Math.min(...prices);
      maxP = Math.max(...prices);
    }

    const overallMin = Math.min(minP, lower);
    const overallMax = Math.max(maxP, upper);
    const overallSpan = overallMax - overallMin || 1;
    let yMin = overallMin - overallSpan * 0.08;
    let yMax = overallMax + overallSpan * 0.08;
    if (yMin <= 0) yMin = overallMin * 0.5;

    const markerPrices = [
      { price: upper, label: upper.toExponential(3), color: '#f59e0b' },
      { price: prices.length > 1 ? prices[prices.length - 1] : price, label: (prices.length > 1 ? prices[prices.length - 1] : price).toExponential(3), color: '#60a5fa' },
      { price: lower, label: lower.toExponential(3), color: '#f59e0b' },
    ];

    // Pre-compute bin volume bars (geometric interpolation between lower and upper)
    let binData = null;
    if (p.bin_volumes && p.bin_volumes.length > 1 && p.range_lower > 0 && p.range_upper > 0) {
      const n = p.bin_volumes.length;
      const ratio = Math.pow(p.range_upper / p.range_lower, 1 / (n - 1));
      binData = p.bin_volumes.map((vol, i) => ({
        price: p.range_lower * Math.pow(ratio, i),
        volume: vol,
      }));
    }

    // Update existing chart data in-place OR create new chart
    let ch = charts.get(p.id);
    if (ch && ch.canvas === canvas) {
      // Update data + scales without destroy — zero flicker
      ch.data.labels = labels;
      ch.data.datasets[0].data = prices.map(() => lower);
      ch.data.datasets[1].data = prices;
      ch.data.datasets[2].data = prices.map(() => lower);
      ch.data.datasets[3].data = prices.map(() => upper);
      ch.options.scales.y.min = yMin;
      ch.options.scales.y.max = yMax;
      ch.options._markerPrices = markerPrices;
      ch.options._binData = binData;
      ch.update('none');
    } else {
      // Canvas changed or new position — destroy stale instance, create fresh
      if (ch) ch.destroy();
      ch = new Chart(ctx, {
        type: 'line',
        plugins: [{
          id: 'forceLeftZero',
          afterLayout(chart) { chart.chartArea.left = 0; },
        }],
        data: {
          labels,
          datasets: [
            { data: prices.map(() => lower), borderWidth: 0, pointRadius: 0, fill: 3, backgroundColor: 'rgba(251,191,36,0.12)' },
            { data: prices, borderColor: '#60a5fa', borderWidth: 1.5, pointRadius: 0, pointHitRadius: 3, fill: false, tension: 0.1 },
            { data: prices.map(() => lower), borderColor: '#f59e0b', borderWidth: 2, pointRadius: 0, fill: false },
            { data: prices.map(() => upper), borderColor: '#f59e0b', borderWidth: 2, pointRadius: 0, fill: false },
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false, animation: false,
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          _markerPrices: markerPrices,
          _binData: binData,
          scales: {
            x: {
              display: true,
              ticks: { color: '#888b98', font: { size: 8, family: 'IBM Plex Mono' }, maxTicksLimit: 6, maxRotation: 0 },
              grid: { display: false },
            },
            y: {
              type: 'logarithmic', min: yMin, max: yMax,
              ticks: { display: false },
              grid: { display: false, drawBorder: false, drawTicks: false },
              border: { display: false },
              afterFit: axis => { axis.width = 0; axis.paddingTop = 0; axis.paddingBottom = 0; axis.paddingLeft = 0; axis.paddingRight = 0; },
            },
          },
          interaction: { intersect: false, mode: 'index' },
        },
      });
      charts.set(p.id, ch);
    }

    // range bar (update in-place — no innerHTML flicker)
    const rangeEl = card.querySelector('.range-bar-wrap');
    if (rangeEl) {
      const curPrice = prices.length > 1 ? prices[prices.length - 1] : price;
      const rLower = lower;
      const rUpper = upper;
      const span = (rUpper - rLower) || 1;
      // Zoom out 40% each side so OOR cursor stays visible
      const zoomOut = 0.4;
      const barLower = rLower - span * zoomOut;
      const barUpper = rUpper + span * zoomOut;
      const barSpan = barUpper - barLower || 1;
      const curPct = Math.min(Math.max(((curPrice - barLower) / barSpan) * 100, 2), 98);

      const fillLeft  = ((rLower - barLower) / barSpan) * 100;
      const fillWidth = ((rUpper - rLower) / barSpan) * 100;

      renderRangeBar(rangeEl, {
        lower: rLower,
        upper: rUpper,
        curPrice,
        curPct,
        fillLeft,
        fillWidth,
      });
    }

    // PnL bar (SL/TP/trail vs net PnL)
    const pnlBar = card.querySelector('.pnl-bar-wrap');
    if (pnlBar) {
      const slPct = c.stopLossPct;
      const tpPct = c.takeProfitPct;
      const netPnlPct = p.pnl_pct || 0;
      // Determine the rightmost threshold for zoom (may extend past TP when trailing is active)
      let effectiveHi = tpPct;
      let trailPct = null;
      if (c.trailingTakeProfit && p.trailing_active && p.peak_pnl_pct != null) {
        trailPct = p.peak_pnl_pct - c.trailingDropPct;
        effectiveHi = Math.max(tpPct, trailPct);
      }
      const span = effectiveHi - slPct;
      const zoom = 0.3;
      const barLo = slPct - span * zoom;
      const barHi = effectiveHi + span * zoom;
      const barSpan = barHi - barLo || 1;
      const curX    = Math.min(Math.max(((netPnlPct - barLo) / barSpan) * 100, 2), 98);
      const slX     = ((slPct - barLo) / barSpan) * 100;
      const tpX     = ((tpPct - barLo) / barSpan) * 100;
      const trailX  = trailPct != null ? ((trailPct - barLo) / barSpan) * 100 : null;

      renderPnlBar(pnlBar, { slPct, tpPct, netPnlPct, curX, slX, tpX, trailX, trailPct, barLo, barSpan });
    }
  });
}

function renderRangeBar(rangeEl, data) {
  const C_AMBER    = '#f59e0b';
  const C_BLUE     = '#60a5fa';
  const AMBER_DIM  = 'rgba(251,191,36,0.12)';

  const fill = ensureRangeChild(rangeEl, '.range-fill', 'div', 'range-fill', { position: 'absolute', top: '0', height: '100%', background: AMBER_DIM, borderLeft: `2px solid ${C_AMBER}`, borderRight: `2px solid ${C_AMBER}`, borderRadius: '2px' });
  const labelL = ensureRangeChild(rangeEl, '.range-label.l', 'span', 'range-label l', { position: 'absolute', top: '50%', transform: 'translateY(-50%)', fontSize: '9px', fontFamily: "'IBM Plex Mono', monospace", color: 'var(--text2)', whiteSpace: 'nowrap' });
  const labelR = ensureRangeChild(rangeEl, '.range-label.r', 'span', 'range-label r', { position: 'absolute', top: '50%', transform: 'translateY(-50%)', fontSize: '9px', fontFamily: "'IBM Plex Mono', monospace", color: 'var(--text2)', whiteSpace: 'nowrap' });
  const cursorLine = ensureRangeChild(rangeEl, '.cursor-line', 'div', 'cursor-line', { position: 'absolute', bottom: '0', width: '1.5px', height: '100%', background: C_BLUE, zIndex: '5' });
  const cursorLabel = ensureRangeChild(rangeEl, '.cursor-price', 'span', 'cursor-price', { position: 'absolute', bottom: '0', fontSize: '7px', fontFamily: "'IBM Plex Mono', monospace", color: C_BLUE, zIndex: '5', lineHeight: '10px', whiteSpace: 'nowrap' });

  fill.style.left = `${data.fillLeft}%`;
  fill.style.width = `${data.fillWidth}%`;
  labelL.style.left = `${data.fillLeft}%`;
  labelL.style.transform = 'translateX(calc(-100% - 3px))';
  labelL.textContent = data.lower.toExponential(2);
  labelR.style.right = 'auto';
  labelR.style.left = `${data.fillLeft + data.fillWidth}%`;
  labelR.style.transform = 'translateX(3px)';
  labelR.textContent = data.upper.toExponential(2);

  cursorLine.style.left = `${data.curPct}%`;
  cursorLabel.style.left = `${data.curPct}%`;
  cursorLabel.style.transform = 'translateX(2px)';
  cursorLabel.textContent = data.curPrice.toExponential(3);
}

function renderPnlBar(el, d) {
  const C_BLUE   = '#60a5fa';
  const C_AMBER  = '#f59e0b';

  // Background gradient
  let bg = el.querySelector('.pnl-bar-bg');
  if (!bg) { bg = document.createElement('div'); bg.className = 'pnl-bar-bg'; el.appendChild(bg); }

  // SL line + label
  let sl = el.querySelector('.pnl-sl-line');
  if (!sl) { sl = document.createElement('div'); sl.className = 'pnl-sl-line'; el.appendChild(sl); }
  sl.style.left = `${d.slX}%`;

  let slLbl = el.querySelector('.pnl-sl-label');
  if (!slLbl) { slLbl = document.createElement('div'); slLbl.className = 'pnl-sl-label'; el.appendChild(slLbl); }
  slLbl.style.left = `${d.slX}%`;
  slLbl.style.transform = 'translateX(-100%)';
  slLbl.textContent = `${d.slPct >= 0 ? '+' : ''}${d.slPct}%`;

  // TP line + label
  let tp = el.querySelector('.pnl-tp-line');
  if (!tp) { tp = document.createElement('div'); tp.className = 'pnl-tp-line'; el.appendChild(tp); }
  tp.style.left = `${d.tpX}%`;

  let tpLbl = el.querySelector('.pnl-tp-label');
  if (!tpLbl) { tpLbl = document.createElement('div'); tpLbl.className = 'pnl-tp-label'; el.appendChild(tpLbl); }
  tpLbl.style.left = `${d.tpX}%`;
  tpLbl.style.transform = 'translateX(3px)';
  tpLbl.textContent = `+${d.tpPct}%`;

  // Trailing exit line (amber, dashed) — only when trailing is active
  let trailLine = el.querySelector('.pnl-trail-line');
  let trailLbl  = el.querySelector('.pnl-trail-label');
  if (d.trailX != null) {
    if (!trailLine) { trailLine = document.createElement('div'); trailLine.className = 'pnl-trail-line'; el.appendChild(trailLine); }
    trailLine.style.cssText = `position:absolute;top:0;width:1.5px;height:100%;background:repeating-linear-gradient(90deg,${C_AMBER},${C_AMBER} 3px,transparent 3px,transparent 6px);z-index:4;pointer-events:none;left:${d.trailX}%`;

    if (!trailLbl) { trailLbl = document.createElement('div'); trailLbl.className = 'pnl-trail-label'; el.appendChild(trailLbl); }
    trailLbl.style.cssText = `position:absolute;bottom:0;font-size:7px;font-family:'IBM Plex Mono',monospace;white-space:nowrap;z-index:4;color:${C_AMBER};left:${d.trailX}%;transform:translateX(3px)`;
    trailLbl.textContent = `trail ${d.trailPct >= 0 ? '+' : ''}${d.trailPct.toFixed(1)}%`;
  } else {
    if (trailLine) trailLine.remove();
    if (trailLbl) trailLbl.remove();
  }

  // Cursor vertical line
  let cur = el.querySelector('.pnl-cursor');
  if (!cur) { cur = document.createElement('div'); cur.className = 'pnl-cursor'; el.appendChild(cur); }
  cur.style.left = `${d.curX}%`;
  cur.style.background = C_BLUE;

  // Zero vertical line (white) — use same bar bounds as caller for alignment
  let zero = el.querySelector('.pnl-zero-line');
  if (!zero) { zero = document.createElement('div'); zero.className = 'pnl-zero-line'; el.appendChild(zero); }
  const zeroX = d.barSpan > 0 ? ((0 - d.barLo) / d.barSpan) * 100 : 50;
  zero.style.cssText = `position:absolute;top:0;width:1px;height:100%;background:rgba(255,255,255,0.4);z-index:2;pointer-events:none;left:${zeroX}%`;

  // Cursor label
  let curLbl = el.querySelector('.pnl-cursor-label');
  if (!curLbl) { curLbl = document.createElement('div'); curLbl.className = 'pnl-cursor-label'; el.appendChild(curLbl); }
  curLbl.style.left = `${d.curX}%`;
  curLbl.style.transform = 'translateX(-50%)';
  curLbl.style.color = C_BLUE;
  curLbl.textContent = `${d.netPnlPct >= 0 ? '+' : ''}${d.netPnlPct.toFixed(2)}%`;
}

function ensureRangeChild(parent, selector, tag, className, style) {
  let el = parent.querySelector(selector);
  if (!el) {
    el = document.createElement(tag);
    el.className = className;
    Object.assign(el.style, style);
    parent.appendChild(el);
  }
  return el;
}

fetchData();
setInterval(fetchData, 5000); // auto-refresh every 5s

// Page Visibility API: refetch immediately when tab becomes visible again
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') fetchData();
});
</script>
</body>
