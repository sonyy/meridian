<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>meridian · dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0b0e;
    --bg2: #12141a;
    --bg3: #1a1d26;
    --border: #242834;
    --text: #e2e5eb;
    --text2: #888b98;
    --green: #34d399;
    --green-dim: rgba(52,211,153,.12);
    --red: #fb7185;
    --red-dim: rgba(251,113,133,.1);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,.1);
    --blue: #60a5fa;
    --accent: #34d399;
    --radius: 10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', -apple-system, sans-serif;
    padding: 24px;
    min-height: 100vh;
  }

  /* ─── header ─── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
  }
  .header h1 {
    font-size: 22px; font-weight: 600; letter-spacing: -.3px;
  }
  .header h1 span { color: var(--accent); }
  .header-right {
    display: flex; align-items: center; gap: 16px;
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text2);
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    font-family: 'IBM Plex Mono', monospace; font-weight: 500;
  }
  .badge.on { background: var(--green-dim); color: var(--green); }
  .badge.off { background: var(--red-dim); color: var(--red); }

  /* ─── summary bar ─── */
  .summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr));
    gap: 12px; margin-bottom: 32px;
  }
  .summary-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .summary-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text2); margin-bottom: 6px; }
  .summary-card .value { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 500; }
  .summary-card .value.green { color: var(--green); }
  .summary-card .value.red { color: var(--red); }
  .summary-card .value.amber { color: var(--amber); }
  .summary-card .sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ─── config bar ─── */
  .config-bar {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 28px; font-size: 12px; font-family: 'IBM Plex Mono', monospace;
  }
  .config-tag {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; color: var(--text2);
  }
  .config-tag strong { color: var(--text); font-weight: 500; }

  /* ─── section titles ─── */
  .section-title {
    font-size: 14px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .6px; color: var(--text2); margin-bottom: 16px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .count {
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    background: var(--bg3); padding: 1px 8px; border-radius: 10px; color: var(--text);
  }

  /* ─── position grid ─── */
  .positions { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px,1fr)); gap: 16px; margin-bottom: 36px; }

  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .card-header .pair {
    font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px;
  }
  .card-header .pair .oor-badge {
    font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .oor-badge.in { background: var(--green-dim); color: var(--green); }
  .oor-badge.out { background: var(--red-dim); color: var(--red); }
  .card-header .pnl-big {
    font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600;
  }
  .card-body { padding: 14px 16px; }

  .meta-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; margin-bottom: 12px;
    font-size: 12px;
  }
  .meta-grid .m-label { color: var(--text2); }
  .meta-grid .m-value { font-family: 'IBM Plex Mono', monospace; text-align: right; }

  /* ─── chart area ─── */
  .chart-wrap {
    position: relative; height: 90px; margin-top: 4px; border-radius: 6px;
    background: var(--bg3); overflow: hidden;
  }
  .chart-wrap canvas { width: 100% !important; height: 90px !important; }

  /* ─── range bar ─── */
  .range-bar-wrap {
    position: relative; height: 28px; margin-top: 8px;
    background: var(--bg3); border-radius: 5px; overflow: hidden;
  }
  .range-fill {
    position: absolute; top: 0; height: 100%;
    background: var(--green-dim); border-left: 2px solid var(--green);
    border-right: 2px solid var(--green); border-radius: 2px;
  }
  .range-label {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 9px; font-family: 'IBM Plex Mono', monospace; color: var(--text2);
    white-space: nowrap;
  }
  .range-label.l { left: 4px; }
  .range-label.r { right: 4px; }

  .sl-tp-line {
    position: absolute; top: 0; width: 2px; height: 100%;
  }
  .sl-tp-line.sl { background: var(--red); }
  .sl-tp-line.tp { background: var(--green); }

  /* ─── closed table ─── */
  .closed-wrap { overflow-x: auto; }
  .closed-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .closed-table th {
    text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .5px; color: var(--text2); border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  .closed-table td {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
  }
  .closed-table tr:hover td { background: var(--bg3); }

  .no-data {
    text-align: center; padding: 48px 16px; color: var(--text2); font-size: 14px;
  }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .positions { grid-template-columns: 1fr; }
    .summary { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>meridian<span>.</span></h1>
  <div class="header-right">
    <span id="modeBadge"></span>
    <span id="refreshTime"></span>
    <button onclick="fetchData()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 14px;cursor:pointer;font-size:12px;font-family:inherit;">↻</button>
  </div>
</div>

<div class="summary" id="summary"></div>
<div class="config-bar" id="configBar"></div>

<div class="section-title">open positions <span class="count" id="openCount"></span></div>
<div class="positions" id="openPositions"></div>

<div class="section-title">closed trades <span class="count" id="closedCount"></span></div>
<div class="closed-wrap" id="closedWrap"></div>

<script>
let charts = [];
let renderId = 0;

function fetchData() {
  fetch('/api/positions')
    .then(r => r.json())
    .then(d => render(d))
    .catch(e => {
      document.getElementById('openPositions').innerHTML =
        `<div class="no-data">⚠ error loading data: ${e.message}</div>`;
    });
}

function render(d) {
  charts.forEach(c => c.destroy());
  charts = [];
  const curRenderId = ++renderId;

  // mode badge
  document.getElementById('modeBadge').innerHTML =
    d.config.virtualMode
      ? '<span class="badge on">◉ virtual mode</span>'
      : '<span class="badge off">◯ live mode</span>';
  document.getElementById('refreshTime').textContent = new Date().toLocaleTimeString();

  // summary
  const s = d.summary;
  document.getElementById('summary').innerHTML = `
    <div class="summary-card">
      <div class="label">Wallet</div>
      <div class="value">${d.wallet.sol.toFixed(2)} <span style="font-size:12px;color:var(--text2)">SOL</span></div>
    </div>
    <div class="summary-card">
      <div class="label">Deployed</div>
      <div class="value">${s.total_deployed_sol} <span style="font-size:12px;color:var(--text2)">SOL</span></div>
    </div>
    <div class="summary-card">
      <div class="label">Open / Closed</div>
      <div class="value">${s.open_count} / ${s.closed_count}</div>
    </div>
    <div class="summary-card">
      <div class="label">Total PnL</div>
      <div class="value ${s.total_pnl_sol >= 0 ? 'green' : 'red'}">${s.total_pnl_sol >= 0 ? '+' : ''}${s.total_pnl_sol} <span style="font-size:12px;color:var(--text2)">SOL</span></div>
      <div class="sub">fees: ${s.total_fees_sol} SOL</div>
    </div>
    <div class="summary-card">
      <div class="label">Win Rate</div>
      <div class="value">${s.win_rate}%</div>
      <div class="sub">${s.wins}W / ${s.losses}L</div>
    </div>
  `;

  // config bar
  const c = d.config;
  document.getElementById('configBar').innerHTML = `
    <span class="config-tag">strategy <strong>${c.strategy}</strong></span>
    <span class="config-tag">SL <strong>${c.stopLossPct}%</strong></span>
    <span class="config-tag">TP <strong>${c.takeProfitPct}%</strong></span>
    <span class="config-tag">trailing <strong>${c.trailingTakeProfit ? 'ON' : 'OFF'}</strong></span>
    <span class="config-tag">OOR wait <strong>${c.outOfRangeWaitMinutes}m</strong></span>
    <span class="config-tag">deploy <strong>${c.deployAmountSol} SOL</strong></span>
  `;

  // open positions
  const openList = d.open || [];
  document.getElementById('openCount').textContent = openList.length;
  document.getElementById('openPositions').innerHTML =
    openList.length === 0
      ? '<div class="no-data">no open positions</div>'
      : openList.map((p, i) => renderCard(p, i, c)).join('');

  // closed
  const closedList = d.closed || [];
  document.getElementById('closedCount').textContent = closedList.length;

  if (closedList.length === 0) {
    document.getElementById('closedWrap').innerHTML = '<div class="no-data">no closed trades yet</div>';
  } else {
    document.getElementById('closedWrap').innerHTML =
      `<table class="closed-table">
        <thead><tr>
          <th>Pair</th><th>Deposit</th><th>PnL</th><th>Fees</th><th>Duration</th><th>Close</th>
        </tr></thead>
        <tbody>
          ${closedList.map(p => `
            <tr>
              <td style="font-weight:500">${p.pair}</td>
              <td>${p.deposit?.toFixed(2)} SOL</td>
              <td style="color:${(p.pnl_pct||0) >= 0 ? 'var(--green)' : 'var(--red)'}">${(p.pnl_pct||0) >= 0 ? '+' : ''}${p.pnl_pct?.toFixed(1)}% (${(p.net_pnl||0) >= 0 ? '+' : ''}${p.net_pnl?.toFixed(4)})</td>
              <td>${(p.fees_earned||0).toFixed(4)} SOL</td>
              <td>${p.duration_hours?.toFixed(1) || '-'}h</td>
              <td>${p.closed_at ? new Date(p.closed_at).toLocaleDateString() : '-'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  // draw charts
  openList.forEach((p, i) => drawChart(p, i, c, curRenderId));
}

function renderCard(p, i, c) {
  const pnlClass = (p.pnl_pct || 0) >= 0 ? 'green' : 'red';
  const oorClass = p.in_range ? 'in' : 'out';
  const oorLabel = p.in_range ? 'IN' : p.minutes_out_of_range != null ? `OOR ${p.minutes_out_of_range}m` : 'OOR';
  const dur = p.duration_hours != null ? `${p.duration_hours.toFixed(1)}h` : '-';

  return `
    <div class="card" id="card-${i}">
      <div class="card-header">
        <div class="pair">
          ${p.pair}
          <span class="oor-badge ${oorClass}">${oorLabel}</span>
        </div>
        <div class="pnl-big ${pnlClass}">${(p.pnl_pct||0) >= 0 ? '+' : ''}${(p.pnl_pct||0).toFixed(2)}%</div>
      </div>
      <div class="card-body">
        <div class="meta-grid">
          <span class="m-label">strategy</span><span class="m-value">${p.strategy || '-'}</span>
          <span class="m-label">deposit</span><span class="m-value">${(p.deposit||0).toFixed(2)} SOL</span>
          <span class="m-label">net PnL</span><span class="m-value ${pnlClass}">${(p.net_pnl||0) >= 0 ? '+' : ''}${(p.net_pnl||0).toFixed(4)} SOL</span>
          <span class="m-label">fees earned</span><span class="m-value">${(p.fees_earned||0).toFixed(4)} SOL</span>
          <span class="m-label">fee APR</span><span class="m-value">${p.annualized_fee_apr != null ? p.annualized_fee_apr.toFixed(1) + '%' : '-'}</span>
          <span class="m-label">IL</span><span class="m-value">${(p.il_usd||0).toFixed(4)} SOL</span>
          <span class="m-label">age</span><span class="m-value">${dur}</span>
          <span class="m-label">candles</span><span class="m-value">${p.candles_total || 0}</span>
        </div>
        <div class="chart-wrap">
          <canvas id="chart-${i}"></canvas>
        </div>
        <div class="range-bar-wrap" id="range-${i}"></div>
      </div>
    </div>
  `;
}

function drawChart(p, i, c, curRenderId) {
  const canvas = document.getElementById(`chart-${i}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  const entryPrice = p.entry_price || 1;
  const price = p.last_price || entryPrice;
  const rawLower = p.range_lower || price * 0.5;
  const rawUpper = p.range_upper || price * 1.5;
  // klineScale aligns position price scale with kline market price scale
  let klineScale = 1;
  const tokenSymbol = (p.chart_token || p.pair?.split('-')[0] || '').toUpperCase();
  const cacheKey = `kline_${tokenSymbol}`;

  let cachedRaw = sessionStorage.getItem(cacheKey);
  let cached = cachedRaw ? JSON.parse(cachedRaw) : null;
  let klinePromise;
  if (cached && Date.now() - (cached._cachedAt || 0) < 120000) {
    klinePromise = Promise.resolve(cached);
  } else {
    klinePromise = fetch(`/api/kline/${tokenSymbol}`).then(r => r.json()).then(d => {
        if (d.candles && d.candles.length) {
          d._cachedAt = Date.now();
          sessionStorage.setItem(cacheKey, JSON.stringify(d));
          return d;
        }
        return null;
      }).catch(() => null);
  }

  klinePromise.then(kd => {
    if (curRenderId !== renderId) return;

    const prices = [];
    const labels = [];
    let minP = Infinity, maxP = -Infinity;
    let firstClose = 0;

    if (kd && kd.candles && kd.candles.length > 2) {
      // Determine kline scale from first candle vs entry_price
      firstClose = parseFloat(kd.candles[0].close || kd.candles[0].c) || 0;
      if (entryPrice > 0 && firstClose > 0) klineScale = firstClose / entryPrice;

      // sample down to ~60 points max
      const step = Math.max(1, Math.floor(kd.candles.length / 60));
      for (let idx = 0; idx < kd.candles.length; idx += step) {
        const cdl = kd.candles[idx];
        const c = parseFloat(cdl.close || cdl.c);
        const t = cdl.time || cdl.t;
        if (!isNaN(c)) {
          prices.push(c);
          const d = new Date(Number(t));
          labels.push(d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0'));
          if (c < minP) minP = c;
          if (c > maxP) maxP = c;
        }
      }
    } else {
      const steps = 20;
      for (let k = 0; k <= steps; k++) {
        const t = k / steps;
        const base = entryPrice + (price - entryPrice) * t;
        prices.push(base);
        labels.push('');
      }
      minP = Math.min(...prices);
      maxP = Math.max(...prices);
    }

    // Scale range values to match kline price scale
    const lower = rawLower * klineScale;
    const upper = rawUpper * klineScale;

    // Y-axis spans all data (price + scaled range)
    const overallMin = Math.min(minP, lower);
    const overallMax = Math.max(maxP, upper);
    const overallSpan = overallMax - overallMin || 1;
    let yMin = overallMin - overallSpan * 0.08;
    let yMax = overallMax + overallSpan * 0.08;
    // log scale requires positive yMin
    if (yMin <= 0) yMin = overallMin * 0.5;

    // destroy stale chart for this position index
    if (charts[i]) { charts[i].destroy(); }

    const ch = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          // 0: range fill band (amber between lower→upper) — fill to dataset index 3
          {
            data: prices.map(() => lower),
            borderWidth: 0,
            pointRadius: 0,
            fill: 3,
            backgroundColor: 'rgba(251,191,36,0.12)',
          },
          // 1: price line
          {
            data: prices,
            borderColor: '#34d399',
            borderWidth: 1.5,
            pointRadius: 0,
            pointHitRadius: 3,
            fill: false,
            tension: 0.1,
          },
          // 2: range lower line
          {
            data: prices.map(() => lower),
            borderColor: '#f59e0b',
            borderWidth: 2,
            pointRadius: 0,
            fill: false,
          },
          // 3: range upper line
          {
            data: prices.map(() => upper),
            borderColor: '#f59e0b',
            borderWidth: 2,
            pointRadius: 0,
            fill: false,
          },
          // 4: entry price (scaled to kline prices)
          {
            data: prices.map(() => entryPrice * klineScale),
            borderColor: 'rgba(96,165,250,0.5)',
            borderWidth: 1.5,
            borderDash: [3, 3],
            pointRadius: 0,
            fill: false,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          x: {
            display: true,
            ticks: {
              color: '#888b98',
              font: { size: 8, family: 'IBM Plex Mono' },
              maxTicksLimit: 6,
              maxRotation: 0,
            },
            grid: { display: false },
          },
          y: {
            type: 'logarithmic',
            display: true,
            min: yMin,
            max: yMax,
            ticks: {
              color: '#888b98',
              font: { size: 9, family: 'IBM Plex Mono' },
              callback: v => v.toExponential(2),
              maxTicksLimit: 5,
            },
            grid: { color: 'rgba(36,40,52,0.6)', drawBorder: false },
          },
        },
        interaction: { intersect: false, mode: 'index' },
      },
    });
    charts[i] = ch;

    // range bar below chart (use scaled lower/upper)
    const rangeEl = document.getElementById(`range-${i}`);
    if (rangeEl) {
      const curPrice = prices.length > 1 ? prices[prices.length - 1] : price * klineScale;
      const rLower = lower;
      const rUpper = upper;
      const totalSpan = (rUpper - rLower) || 1;
      const loPct = 0;
      const hiPct = 100;
      const curPct = ((curPrice - rLower) / totalSpan) * 100;

      // SL/TP in kline scale
      const scaledEntry = entryPrice * klineScale;
      const slPrice = scaledEntry ? scaledEntry * (1 + (c.stopLossPct || -20) / 100) : null;
      const tpPrice = scaledEntry ? scaledEntry * (1 + (c.takeProfitPct || 10) / 100) : null;
      const slPct = slPrice != null && totalSpan > 0 ? ((slPrice - rLower) / totalSpan) * 100 : null;
      const tpPct = tpPrice != null && totalSpan > 0 ? ((tpPrice - rLower) / totalSpan) * 100 : null;

      rangeEl.innerHTML = `
        <div class="range-fill" style="left:${loPct}%;width:${hiPct - loPct}%">
          <span class="range-label l">${rLower.toExponential(2)}</span>
          <span class="range-label r">${rUpper.toExponential(2)}</span>
        </div>
        ${slPct != null && slPct >= 0 && slPct <= 100 ? `
          <div class="sl-tp-line sl" style="left:${slPct}%"></div>
          <span style="position:absolute;top:1px;left:${slPct}%;transform:translateX(calc(-100% - 2px));font-size:7px;font-family:'IBM Plex Mono',monospace;color:var(--red);z-index:3;line-height:12px;">SL</span>
        ` : ''}
        ${tpPct != null && tpPct >= 0 && tpPct <= 100 ? `
          <span style="position:absolute;top:1px;left:${tpPct}%;transform:translateX(calc(-100% - 2px));font-size:7px;font-family:'IBM Plex Mono',monospace;color:var(--green);z-index:3;line-height:12px;">TP</span>
          <div class="sl-tp-line tp" style="left:${tpPct}%"></div>
        ` : ''}
        <div style="position:absolute;bottom:0;left:${Math.min(Math.max(curPct,0),100)}%;width:1.5px;height:100%;background:var(--blue);z-index:5;"></div>
        <div style="position:absolute;top:0;left:${Math.min(Math.max(curPct,0),100)}%;transform:translateX(-50%);width:0;height:0;border-left:3px solid transparent;border-right:3px solid transparent;border-top:5px solid var(--blue);z-index:5;"></div>
        <span style="position:absolute;bottom:0;left:${Math.min(Math.max(curPct,0),100)}%;transform:translateX(2px);font-size:7px;font-family:'IBM Plex Mono',monospace;color:var(--blue);z-index:5;line-height:10px;white-space:nowrap;">${curPrice.toExponential(3)}</span>
      `;
    }
  });
}

fetchData();
setInterval(fetchData, 15000); // auto-refresh every 15s
</script>
</body>
</html>
